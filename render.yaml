# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  SGYT ENGINE — Render.com deployment config                            ║
# ║                                                                          ║
# ║  HOW TO DEPLOY (one-time):                                              ║
# ║    1. Push this repo to GitHub (any account, public or private)         ║
# ║    2. Go to render.com → New → Web Service → connect the repo           ║
# ║    3. Render auto-detects this file — just click Deploy                 ║
# ║    4. Set the env vars listed below in the Render dashboard             ║
# ║    5. Your API URL will be: https://your-service.onrender.com           ║
# ║                                                                          ║
# ║  FREE TIER NOTES:                                                        ║
# ║  • The service sleeps after 15 min of inactivity.                       ║
# ║    First request after sleep takes ~20-30s to spin up.                  ║
# ║    The frontend handles this with a "Waking server..." message.         ║
# ║  • 750 free hours/month — more than enough for one service.             ║
# ╚══════════════════════════════════════════════════════════════════════════╝

services:
  - type: web
    name: sgyt-engine
    runtime: node
    region: singapore  # change to: oregon, frankfurt, ohio, virginia

    # ── Build step ────────────────────────────────────────────────────────────
    # This runs once when Render builds your deployment image.
    # npm install is a no-op here (no dependencies) but good practice.
    # We download the yt-dlp standalone binary directly from GitHub releases
    # into ./bin/ so the server can always find it at a known relative path.
    # The binary is a Python zipapp — Render's Ubuntu image includes Python 3.
    buildCommand: >
      npm install &&
      mkdir -p bin &&
      curl -fsSL
      https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp
      -o bin/yt-dlp &&
      chmod +x bin/yt-dlp &&
      bin/yt-dlp --version

    startCommand: node server.js

    # ── Environment variables ─────────────────────────────────────────────────
    # Set these in: Render dashboard → your service → Environment
    envVars:
      # PORT is injected automatically by Render — do not set it manually.
      - key: PORT
        generateValue: false  # Render sets this; listing it here for documentation only

      # CORS_ORIGIN: set to your frontend domain to restrict who can call the API.
      # Use * for open access (fine if you have API_KEY set).
      - key: CORS_ORIGIN
        value: "*"

      # RATE_LIMIT: max requests per IP per minute. 10 is generous for a personal tool.
      - key: RATE_LIMIT
        value: "10"

      # API_KEY: optional secret. If set, the frontend must send X-API-Key: <value>.
      # Generate one with: openssl rand -hex 24
      # Leave empty to run without auth.
      - key: API_KEY
        value: ""
